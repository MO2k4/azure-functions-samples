services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: >-
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --loose
      --skipApiVersionCheck
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: nc -z 127.0.0.1 10000
      interval: 3s
      retries: 5
      start_period: 5s

  functions:
    build:
      context: .
      dockerfile: HttpTriggerDemo/Dockerfile
    ports:
      - "8080:80"
    environment:
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1
      - CLEANUP_SCHEDULE=0 */1 * * * *
    depends_on:
      azurite:
        condition: service_healthy

  functions-debug:
    build:
      context: .
      dockerfile: HttpTriggerDemo/Dockerfile
      target: debug
    volumes:
      - ./HttpTriggerDemo:/src/HttpTriggerDemo
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - AzureWebJobsStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1
      - CLEANUP_SCHEDULE=0 */1 * * * *
    depends_on:
      - azurite
    profiles: [debug]

volumes:
  azurite-data:
